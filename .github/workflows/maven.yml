name: Java CI com Maven

# Define quando essa automação vai rodar (em todo push para a branch principal)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # O servidor virtual que o GitHub vai emprestar para rodar o código
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Instala o Java 21
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Salva as dependências em cache para rodar mais rápido da próxima vez

      # Passo 3: Roda o comando de compilação do Maven
      - name: Compilar o projeto com Maven
        run: mvn clean package -DskipTests